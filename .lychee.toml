# Lychee link checker configuration
# https://github.com/lycheeverse/lychee

# Check relative file paths as well as external URLs
include_fragments = false

# Retry transient failures
max_retries = 3

# Timeout per request (seconds)
timeout = 20

# Accept these HTTP status codes as valid
accept = [200, 206, 429]

# Exclude placeholder and template links that appear in skill output templates
exclude = [
  # Template placeholder in pr-description skill
  "^url$",
  # Skill trigger references used as text (not real URLs)
  "^/[a-z-]+$",
]

# Exclude files that are not meant to have real links
exclude_path = []
