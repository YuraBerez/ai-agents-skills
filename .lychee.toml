# Lychee link checker configuration
# https://github.com/lycheeverse/lychee

include_fragments = false
max_retries = 3
timeout = 20

# Accept these HTTP status codes as valid
accept = [200, 206, 429]

# Exclude URLs that reliably block bots or are intentional placeholders
exclude = [
  # Returns 403 to bots/crawlers — known valid URL
  "claude\\.ai",
  # Template placeholder in pr-description skill
  "your-tracker",
  # Skill trigger references used as inline code (not real URLs)
  "^/[a-z-]+$",
]
