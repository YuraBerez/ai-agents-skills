name: Link Check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.lychee.toml'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.lychee.toml'
      - '.github/workflows/link-check.yml'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .lychee.toml
            --verbose
            --no-progress
            './**/*.md'
          fail: true
